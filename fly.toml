app = "visa-cleanup"
primary_region = "sjc"

[build]

[env]
  PORT = "8000"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "visa_cleanup_data"
  destination = "/data"
  initial_size = "1gb"
